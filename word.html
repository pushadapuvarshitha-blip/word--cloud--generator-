<!DOCTYPE html>
<html lang="en">
    <head>
        <title>word cloud generater</title>
        <!-- Required meta tags -->
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"/>
        <style>
            body{
                font-family: Arial, sans-serif;
                background-color: #f4f4f4;
                overflow:hidden;
             }
             #container{
                width:100%;
                height:100vh;
                position:relative;
                border:1px solid #ccc;
                overflow:hidden;
             }
             .word{
                position:absolute;
                font-weight:bold;
                user-select:none;
             }
             #inputBox{
                width:70%;
                padding:10px;
                font-size:18px;
                border-radius:8px;
             }
             #btn{
                padding:10px 20px;
                font-size:18px;
                background:#0078ff;
                color:white;
                border:none;
                border-radius:8px;
                cursor:pointer;
             }
             #btn:hover{
                background:#005fcc;
             }
             #controls{
                text-align:center;
                margin:20px;
             }
              </style>
             </head>
                <body>
                    <div id="controls">
                        <h1>Word Cloud Generator</h1>
                        <input type="text" id="inputBox" placeholder="Enter words separated by space"/>
                        <button id="btn" onclick="generateWordCloud()">Generate</button>
                     </div>
                     <div id="container"></div>
                        <script>
                            function randomcolor() {
                                const r=Math.floor(Math.random()*256);
                                const g=Math.floor(Math.random()*256);
                                const b=Math.floor(Math.random()*256);
                                return `rgb(${r},${g},${b})`;
                            }
                            function generateWordCloud() {
                                const container=document.getElementById("container");
                                const input=document.getElementById("inputBox").value;
                            
                                 // Clear previous words
                                container.innerHTML="";
                                if(input.trim()===""){
                                    alert("Please enter some words!");
                                    return;
                                }
                                const words=input.split(" ");
                                words.forEach(word=>{
                                    const span=document.createElement("span");
                                    span.className="word";
                                    span.innerText=word;
                                    //Random font size between 15px to 50px
                                    const size=Math.floor(Math.random()*36)+15;
                                    span.style.fontSize=size+"px";
                                    //Random color
                                    span.style.color=randomcolor();
                                    //Random positions(within container)
                                    const maxX=container.clientWidth-100;
                                    const maxY=container.clientHeight-50;
                                    const x=Math.random()*maxX;
                                    const y=Math.random()*maxY;
                                    span.style.left=x+"px";
                                    span.style.top=y+"px";
                                    container.appendChild(span);
                                });
                            }
                            </script>
                            </body>
                            </html>
